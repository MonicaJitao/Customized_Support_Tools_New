<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>承兑保证金比例计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "Segoe UI", Tahoma, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }

        .header {
            background: white;
            padding: 20px 40px;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 20px;
            font-weight: 500;
            color: #333;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .config-btn {
            padding: 8px 16px;
            background: white;
            color: #1890ff;
            border: 1px solid #1890ff;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .config-btn:hover {
            background: #e6f7ff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .card {
            background: white;
            border-radius: 4px;
            padding: 24px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 500;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e8e8e8;
        }

        .tab-container {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            background: white;
            color: #666;
            transition: all 0.3s;
        }

        .tab:hover {
            color: #1890ff;
            border-color: #1890ff;
        }

        .tab.active {
            background: #1890ff;
            color: white;
            border-color: #1890ff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.3s;
            outline: none;
        }

        .form-input:hover {
            border-color: #40a9ff;
        }

        .form-input:focus {
            border-color: #1890ff;
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.2);
        }

        .form-input:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
        }

        .mode-content {
            display: none;
        }

        .mode-content.active {
            display: block;
        }

        .calculate-btn {
            width: 100%;
            padding: 10px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .calculate-btn:hover {
            background: #40a9ff;
        }

        .calculate-btn:active {
            background: #096dd9;
        }

        .result-empty {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .result-empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .result-display {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .result-display.show {
            display: block;
        }

        .result-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 16px;
        }

        .result-value {
            font-size: 64px;
            font-weight: 600;
            color: #1890ff;
        }

        /* Modal样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 4px;
            width: 90%;
            max-width: 1000px;
            max-height: 85vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 16px 24px;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 500;
            color: #333;
        }

        .modal-close {
            font-size: 24px;
            color: #999;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            width: 24px;
            height: 24px;
            line-height: 24px;
        }

        .modal-close:hover {
            color: #333;
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
        }

        .modal-body iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">承兑保证金比例计算器</div>
        <div class="header-actions">
            <!-- 配置中心按钮，仅管理员可见 -->
            <button class="config-btn" id="configBtn" style="display: none;" onclick="openConfigCenter()">
                ⚙️ 配置中心
            </button>
        </div>
    </div>

    <div class="container">
        <div class="main-content">
            <!-- 左侧：计算输入 -->
            <div class="card">
                <div class="card-title">计算参数</div>

                <div class="tab-container">
                    <div class="tab active" onclick="switchMode('mode1')">价格 → 保证金比例</div>
                    <div class="tab" onclick="switchMode('mode2')">保证金比例 → 价格</div>
                </div>

                <!-- 模式1: 通过价格计算保证金比例 -->
                <div id="mode1" class="mode-content active">
                    <div class="form-group">
                        <label class="form-label">应用FTP (%)</label>
                        <input type="number" class="form-input" id="ftp1" value="2.13" step="0.01" min="0" disabled>
                    </div>

                    <div class="form-group">
                        <label class="form-label">目标锚定价格 (%)</label>
                        <input type="number" class="form-input" id="targetPrice" placeholder="请输入目标价格" step="0.01" min="0">
                    </div>

                    <button class="calculate-btn" onclick="calculateMode1()">计算保证金比例</button>
                </div>

                <!-- 模式2: 通过保证金比例计算价格 -->
                <div id="mode2" class="mode-content">
                    <div class="form-group">
                        <label class="form-label">应用FTP (%)</label>
                        <input type="number" class="form-input" id="ftp2" value="2.13" step="0.01" min="0" disabled>
                    </div>

                    <div class="form-group">
                        <label class="form-label">目标保证金比例 (%)</label>
                        <input type="number" class="form-input" id="targetRatio" placeholder="请输入保证金比例" step="1" min="0" max="100">
                    </div>

                    <button class="calculate-btn" onclick="calculateMode2()">计算最低价格</button>
                </div>
            </div>

            <!-- 右侧：计算结果 -->
            <div class="card">
                <div class="card-title">计算结果</div>

                <div class="result-empty" id="resultEmpty">
                    <div class="result-empty-icon">📊</div>
                    <div>请在左侧输入参数并点击计算</div>
                </div>

                <div class="result-display" id="resultDisplay">
                    <div class="result-label" id="resultLabel">计算结果</div>
                    <div class="result-value" id="resultValue">--</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 配置中心Modal -->
    <div class="modal" id="configModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">配置中心</div>
                <button class="modal-close" onclick="closeConfigCenter()">&times;</button>
            </div>
            <div class="modal-body">
                <iframe src="FTP配置管理_PC端.html" style="height: 600px;"></iframe>
            </div>
        </div>
    </div>

    <script>
        // ==================== 权限管理 ====================

        // 检查用户权限
        function checkUserPermission() {
            // 从localStorage获取用户权限
            const userRole = localStorage.getItem('userRole');

            // 如果是管理员，显示配置中心按钮
            if (userRole === 'admin') {
                document.getElementById('configBtn').style.display = 'block';
                // 管理员可以编辑FTP
                document.getElementById('ftp1').disabled = false;
                document.getElementById('ftp2').disabled = false;
            } else {
                // 非管理员隐藏配置中心按钮
                document.getElementById('configBtn').style.display = 'none';
                // 非管理员不能编辑FTP
                document.getElementById('ftp1').disabled = true;
                document.getElementById('ftp2').disabled = true;
            }
        }

        // 设置用户角色（供外部调用）
        function setUserRole(role) {
            localStorage.setItem('userRole', role);
            checkUserPermission();
            loadFTPConfig();
        }

        // 获取当前用户角色
        function getUserRole() {
            return localStorage.getItem('userRole') || 'user';
        }

        // ==================== FTP配置管理 ====================

        // 加载FTP配置
        function loadFTPConfig() {
            const config = JSON.parse(localStorage.getItem('currentFTP') || 'null');
            const ftpValue = config ? config.ftpValue : 2.13;

            // 更新FTP输入框
            document.getElementById('ftp1').value = ftpValue.toFixed(2);
            document.getElementById('ftp2').value = ftpValue.toFixed(2);
        }

        // 打开配置中心
        function openConfigCenter() {
            document.getElementById('configModal').classList.add('show');
        }

        // 关闭配置中心
        function closeConfigCenter() {
            document.getElementById('configModal').classList.remove('show');
            // 重新加载FTP配置
            loadFTPConfig();
        }

        // 监听localStorage变化（当FTP配置更新时）
        window.addEventListener('storage', function(e) {
            if (e.key === 'currentFTP') {
                loadFTPConfig();
            }
        });

        // ==================== 计算功能 ====================

        // 切换计算模式
        function switchMode(mode) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');

            document.querySelectorAll('.mode-content').forEach(content => content.classList.remove('active'));
            document.getElementById(mode).classList.add('active');

            hideResult();
        }

        // 模式1: 通过目标锚定价格计算0手续费保证金比例
        function calculateMode1() {
            const ftp = parseFloat(document.getElementById('ftp1').value);
            const targetPrice = parseFloat(document.getElementById('targetPrice').value);

            if (isNaN(ftp) || ftp <= 0) {
                alert('请输入有效的FTP值');
                return;
            }
            if (isNaN(targetPrice) || targetPrice <= 0) {
                alert('请输入有效的目标价格');
                return;
            }
            if (targetPrice <= ftp) {
                alert('目标价格必须大于FTP');
                return;
            }

            const priceDiff = targetPrice - ftp;
            const ratio = priceDiff / targetPrice;
            const marginRatio = Math.ceil(ratio * 100) / 100;

            showResult('0手续费保证金比例', (marginRatio * 100).toFixed(0) + '%');
        }

        // 模式2: 通过目标保证金比例计算对应最低价格
        function calculateMode2() {
            const ftp = parseFloat(document.getElementById('ftp2').value);
            const targetRatioPercent = parseFloat(document.getElementById('targetRatio').value);

            if (isNaN(ftp) || ftp <= 0) {
                alert('请输入有效的FTP值');
                return;
            }
            if (isNaN(targetRatioPercent) || targetRatioPercent <= 0 || targetRatioPercent >= 100) {
                alert('请输入有效的保证金比例（0-100之间）');
                return;
            }

            const targetRatio = targetRatioPercent / 100;
            const basePrice = (ftp * targetRatio) / (1 - targetRatio);
            const roundedBase = Math.floor(basePrice * 100) / 100;
            const minPrice = roundedBase + ftp;

            showResult('对应最低价格', minPrice.toFixed(2) + '%');
        }

        // 显示结果
        function showResult(label, value) {
            document.getElementById('resultEmpty').style.display = 'none';
            document.getElementById('resultDisplay').classList.add('show');
            document.getElementById('resultLabel').textContent = label;
            document.getElementById('resultValue').textContent = value;
        }

        // 隐藏结果
        function hideResult() {
            document.getElementById('resultEmpty').style.display = 'block';
            document.getElementById('resultDisplay').classList.remove('show');
        }

        // ==================== 页面初始化 ====================

        // 页面加载时初始化
        window.onload = function() {
            checkUserPermission();
            loadFTPConfig();
        };

        // 导出函数供外部使用
        window.setUserRole = setUserRole;
        window.getUserRole = getUserRole;
    </script>
</body>
</html>
