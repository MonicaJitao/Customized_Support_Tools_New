<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置管理员权限</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { background: white; border-radius: 12px; padding: 40px; max-width: 500px; width: 100%; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2); }
        .title { font-size: 24px; font-weight: 600; color: #333; text-align: center; margin-bottom: 32px; }
        .role-selector { display: flex; gap: 16px; margin-bottom: 32px; }
        .role-card { flex: 1; padding: 24px; border: 2px solid #e8e8e8; border-radius: 8px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .role-card:hover { border-color: #1890ff; transform: translateY(-2px); }
        .role-card.active { border-color: #1890ff; background: #e6f7ff; }
        .role-icon { font-size: 48px; margin-bottom: 12px; }
        .role-name { font-size: 16px; font-weight: 500; color: #333; margin-bottom: 8px; }
        .role-desc { font-size: 12px; color: #999; }
        .btn-group { display: flex; gap: 12px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: #1890ff; color: white; }
        .btn-primary:hover { background: #40a9ff; }
        .btn-secondary { background: #f0f0f0; color: #666; }
        .btn-secondary:hover { background: #e0e0e0; }
        .status { margin-top: 24px; padding: 16px; border-radius: 6px; text-align: center; display: none; }
        .status.success { background: #f6ffed; border: 1px solid #b7eb8f; color: #52c41a; }
        .status.show { display: block; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .current-status { margin-bottom: 24px; padding: 16px; background: #f5f7fa; border-radius: 6px; text-align: center; }
        .current-label { font-size: 12px; color: #999; margin-bottom: 8px; }
        .current-value { font-size: 18px; font-weight: 600; color: #1890ff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">设置管理员权限</div>

        <div class="current-status">
            <div class="current-label">当前权限</div>
            <div class="current-value" id="currentRole">--</div>
        </div>

        <div class="role-selector">
            <div class="role-card" onclick="selectRole('admin')">
                <div class="role-icon">👑</div>
                <div class="role-name">管理员</div>
                <div class="role-desc">可配置参数</div>
            </div>
            <div class="role-card" onclick="selectRole('user')">
                <div class="role-icon">👤</div>
                <div class="role-name">普通用户</div>
                <div class="role-desc">仅使用计算器</div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="saveRole()">保存设置</button>
            <button class="btn btn-secondary" onclick="openCalculator()">打开计算器</button>
        </div>

        <div class="status" id="statusMsg"></div>
    </div>

    <script>
        let selectedRole = null;

        // 页面加载时显示当前权限
        window.addEventListener('DOMContentLoaded', function() {
            const currentRole = localStorage.getItem('userRole') || '未设置';
            document.getElementById('currentRole').textContent =
                currentRole === 'admin' ? '管理员' :
                currentRole === 'user' ? '普通用户' : '未设置';

            // 高亮当前角色
            if (currentRole === 'admin' || currentRole === 'user') {
                selectRole(currentRole);
            }
        });

        function selectRole(role) {
            selectedRole = role;
            document.querySelectorAll('.role-card').forEach(card => card.classList.remove('active'));
            event.target.closest('.role-card').classList.add('active');
        }

        function saveRole() {
            if (!selectedRole) {
                showStatus('请选择一个角色', false);
                return;
            }

            localStorage.setItem('userRole', selectedRole);

            // 更新当前权限显示
            document.getElementById('currentRole').textContent =
                selectedRole === 'admin' ? '管理员' : '普通用户';

            showStatus('权限设置成功！', true);
        }

        function openCalculator() {
            window.open('调价计算器_PC端.html', '_blank');
        }

        function showStatus(message, isSuccess) {
            const statusDiv = document.getElementById('statusMsg');
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + (isSuccess ? 'success' : 'error') + ' show';
            setTimeout(() => statusDiv.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
