<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一户一策演算-调价计算器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", sans-serif; background: #f5f7fa; min-height: 100vh; }
        .header { background: white; padding: 20px 40px; border-bottom: 1px solid #e8e8e8; display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-size: 20px; font-weight: 500; color: #333; }
        .config-btn { padding: 8px 16px; background: #1890ff; color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
        .config-btn:hover { background: #40a9ff; }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .card { background: white; border-radius: 4px; padding: 24px; }
        .card-title { font-size: 16px; font-weight: 500; color: #333; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #e8e8e8; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; color: #666; margin-bottom: 8px; }
        .form-input, .form-select { width: 100%; padding: 10px 12px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px; outline: none; }
        .form-input:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.2); }
        .radio-group { display: flex; gap: 12px; }
        .radio-item { flex: 1; padding: 10px; border: 1px solid #d9d9d9; border-radius: 4px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .radio-item.active { border-color: #1890ff; background: #e6f7ff; color: #1890ff; }
        .calculate-btn { width: 100%; padding: 10px; background: #1890ff; color: white; border: none; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; }
        .calculate-btn:hover { background: #40a9ff; }
        .result-empty { text-align: center; padding: 60px 20px; color: #999; }
        .alert-warning { background: #fff7e6; border: 1px solid #ffd591; color: #fa8c16; padding: 12px 16px; border-radius: 4px; margin-bottom: 16px; font-size: 14px; display: none; }
        .alert-warning.show { display: block; }
        .result-display { display: none; }
        .result-display.show { display: block; }
        .result-section { margin-bottom: 24px; }
        .result-item-large { text-align: center; padding: 24px; background: #f0f7ff; border-radius: 8px; border: 2px solid #1890ff; }
        .result-label-large { font-size: 16px; color: #666; margin-bottom: 12px; font-weight: 500; }
        .result-value-large { font-size: 56px; font-weight: 700; color: #1890ff; margin: 12px 0; }
        .result-unit-large { font-size: 18px; color: #999; }
        .result-item-medium { flex: 1; text-align: center; padding: 20px; background: #fafafa; border-radius: 6px; }
        .result-label-medium { font-size: 14px; color: #666; margin-bottom: 8px; }
        .result-value-medium { font-size: 28px; font-weight: 600; color: #333; }
        .result-section:nth-child(2) { display: flex; gap: 16px; }
        .result-detail { margin-top: 20px; }
        .detail-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .detail-label { color: #666; }
        .detail-value { color: #333; font-weight: 500; }
        .chart-container { margin-top: 24px; height: 400px; }
        canvas { width: 100%; height: 100%; }
        .info-text { font-size: 12px; color: #999; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">一户一策演算-调价计算器</div>
        <button class="config-btn" id="configBtn" style="display: none;" onclick="openConfig()">参数配置中心</button>
    </div>
    <div class="container">
        <div class="main-content">
            <div class="card">
                <div class="card-title">参数配置与计算</div>
                <div class="form-group">
                    <label class="form-label">客户类型</label>
                    <div class="radio-group">
                        <div class="radio-item active" onclick="selectCustomerType('Y')">520客户</div>
                        <div class="radio-item" onclick="selectCustomerType('N')">非520客户</div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">当前价格 (%)</label>
                    <input type="number" class="form-input" id="currentPrice" placeholder="请输入" step="0.01">
                </div>
                <div class="form-group">
                    <label class="form-label">当前风险成本 (%)</label>
                    <input type="number" class="form-input" id="riskCost" placeholder="请输入" step="0.01">
                </div>
                <div class="form-group">
                    <label class="form-label">近3个月长周期余额 (万元)</label>
                    <input type="number" class="form-input" id="avgBalance" placeholder="请输入" step="1">
                </div>
                <div class="form-group">
                    <label class="form-label">目标价格 (%)</label>
                    <input type="number" class="form-input" id="targetPrice" placeholder="请输入" step="0.01">
                </div>
                <div class="form-group">
                    <label class="form-label">当前可用额度 (万元)</label>
                    <input type="number" class="form-input" id="availableLimit" placeholder="请输入" step="1">
                </div>
                <div class="form-group">
                    <label class="form-label">预计用款天数 (天)</label>
                    <input type="number" class="form-input" id="expectedDays" placeholder="请输入" step="1">
                </div>
                <button class="calculate-btn" onclick="calculate()">计算目标额度</button>
            </div>
            <div class="card">
                <div class="card-title">计算结果</div>
                <div class="alert-warning" id="warningAlert"></div>
                <div class="result-empty" id="resultEmpty">
                    <div style="font-size: 48px; margin-bottom: 16px;">📊</div>
                    <div>请在左侧输入参数并点击计算</div>
                </div>
                <div class="result-display" id="resultDisplay">
                    <div class="result-section">
                        <div class="result-item-large">
                            <div class="result-label-large">对应3个月长周期目标余额</div>
                            <div class="result-value-large" id="resultValue1">--</div>
                            <div class="result-unit-large">万元</div>
                        </div>
                    </div>
                    <div class="result-section">
                        <div class="result-item-medium">
                            <div class="result-label-medium">日均需提额余额</div>
                            <div class="result-value-medium" id="resultValue2">--</div>
                        </div>
                        <div class="result-item-medium">
                            <div class="result-label-medium">对应用款天数目标余额</div>
                            <div class="result-value-medium" id="resultValue3">--</div>
                        </div>
                    </div>
                    <div class="result-detail">
                        <div class="detail-item">
                            <span class="detail-label">客户类型</span>
                            <span class="detail-value" id="detailType">--</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">当前价格</span>
                            <span class="detail-value" id="detailCurrent">--</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">目标价格</span>
                            <span class="detail-value" id="detailTarget">--</span>
                        </div>
                    </div>
                    <div class="chart-container"><canvas id="chartCanvas"></canvas></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        let customerType = 'Y';

        // Check user permission on page load
        document.addEventListener('DOMContentLoaded', function() {
            checkUserPermission();
        });

        function checkUserPermission() {
            const userRole = localStorage.getItem('userRole');
            if (userRole === 'admin') {
                document.getElementById('configBtn').style.display = 'block';
            } else {
                document.getElementById('configBtn').style.display = 'none';
            }
        }

        function openConfig() {
            window.open('参数配置管理_PC端.html', '_blank');
        }

        function selectCustomerType(type) {
            customerType = type;
            document.querySelectorAll('.radio-item').forEach(item => item.classList.remove('active'));
            event.target.classList.add('active');
        }

        function getConfig() {
            const config = JSON.parse(localStorage.getItem('priceAdjustConfig') || 'null');
            return config || { fxcb: 3.54, profitBp: 101, bottomPrice520: 4.55, bottomPriceNon520Min: 4.55 };
        }

        function calculate() {
            const config = getConfig();
            const currentPrice = parseFloat(document.getElementById('currentPrice').value);
            const riskCost = parseFloat(document.getElementById('riskCost').value);
            const avgBalance = parseFloat(document.getElementById('avgBalance').value);
            const targetPrice = parseFloat(document.getElementById('targetPrice').value);
            const availableLimit = parseFloat(document.getElementById('availableLimit').value);
            const expectedDays = parseFloat(document.getElementById('expectedDays').value);

            // Hide warning
            document.getElementById('warningAlert').classList.remove('show');

            if (isNaN(currentPrice) || isNaN(riskCost) || isNaN(avgBalance) || isNaN(targetPrice) || isNaN(availableLimit) || isNaN(expectedDays)) {
                showWarning('请填写所有必填项');
                return;
            }

            // Calculate bottom price based on new logic
            let bottomPrice;
            if (customerType === 'Y') {
                // 520客户：固定兜底价格
                bottomPrice = config.bottomPrice520;
            } else {
                // 非520客户：max(业务成本 + 风险成本, 非520客户兜底价格下限)
                bottomPrice = Math.max(config.fxcb + riskCost, config.bottomPriceNon520Min || 4.55);
            }

            if (currentPrice <= bottomPrice) {
                showWarning('当前价格必须大于兜底价格 (' + bottomPrice.toFixed(2) + '%)');
                return;
            }

            // Check if target price is too low
            if (targetPrice <= bottomPrice) {
                // Show warning but continue with calculation
                showWarning('⚠️ 目标价格低于兜底价格 (' + bottomPrice.toFixed(2) + '%)');

                // Display special message for low price
                document.getElementById('resultValue1').textContent = '价格过低请调整或升级审批';
                document.getElementById('resultValue1').style.fontSize = '24px';
                document.getElementById('resultValue2').textContent = '-';
                document.getElementById('resultValue3').textContent = '-';
                document.getElementById('detailType').textContent = (customerType === 'Y' ? '520客户' : '非520客户');
                document.getElementById('detailCurrent').textContent = currentPrice.toFixed(2) + '%';
                document.getElementById('detailTarget').textContent = targetPrice.toFixed(2) + '%';

                document.getElementById('resultEmpty').style.display = 'none';
                document.getElementById('resultDisplay').classList.add('show');

                // Clear chart
                const canvas = document.getElementById('chartCanvas');
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return;
            }

            // Calculate three results
            const targetBalance3Month = (currentPrice - bottomPrice) * avgBalance / (targetPrice - bottomPrice);
            const dailyIncreaseBalance = targetBalance3Month - avgBalance;
            const targetBalanceByDays = (90 / expectedDays) * targetBalance3Month;

            // Display results
            document.getElementById('resultValue1').textContent = targetBalance3Month.toFixed(2);
            document.getElementById('resultValue1').style.fontSize = '56px';
            document.getElementById('resultValue2').textContent = (dailyIncreaseBalance >= 0 ? '+' : '') + dailyIncreaseBalance.toFixed(2) + ' 万元';
            document.getElementById('resultValue3').textContent = targetBalanceByDays.toFixed(2) + ' 万元';
            document.getElementById('detailType').textContent = (customerType === 'Y' ? '520客户' : '非520客户');
            document.getElementById('detailCurrent').textContent = currentPrice.toFixed(2) + '%';
            document.getElementById('detailTarget').textContent = targetPrice.toFixed(2) + '%';

            document.getElementById('resultEmpty').style.display = 'none';
            document.getElementById('resultDisplay').classList.add('show');

            drawChart(currentPrice, bottomPrice, avgBalance, targetPrice, targetBalance3Month);
        }

        function showWarning(message) {
            const alert = document.getElementById('warningAlert');
            alert.textContent = message;
            alert.classList.add('show');
        }

        function drawChart(currentPrice, bottomPrice, avgBalance, targetPrice, targetBalance) {
            const canvas = document.getElementById('chartCanvas');
            const ctx = canvas.getContext('2d');
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            const width = rect.width, height = rect.height;
            ctx.clearRect(0, 0, width, height);

            // Generate data points
            const data = [];
            const startPrice = bottomPrice + 0.01;
            const endPrice = Math.max(currentPrice + 2, targetPrice + 2);
            for (let price = startPrice; price <= endPrice; price += 0.05) {
                const balance = (currentPrice - bottomPrice) * avgBalance / (price - bottomPrice);
                if (balance > 0 && balance < 5000) data.push({ price, balance });
            }

            if (data.length === 0) return;

            const minPrice = Math.min(...data.map(d => d.price));
            const maxPrice = Math.max(...data.map(d => d.price));
            const minBalance = 0;
            const maxBalance = Math.max(...data.map(d => d.balance)) * 1.15;

            const padding = 60;
            const chartWidth = width - padding * 2;
            const chartHeight = height - padding * 2;

            const xScale = (price) => padding + (price - minPrice) / (maxPrice - minPrice) * chartWidth;
            const yScale = (balance) => height - padding - (balance - minBalance) / (maxBalance - minBalance) * chartHeight;

            // Draw grid lines
            ctx.strokeStyle = '#f0f0f0'; ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = padding + (chartHeight / 5) * i;
                ctx.beginPath(); ctx.moveTo(padding, y); ctx.lineTo(width - padding, y); ctx.stroke();
            }
            for (let i = 0; i <= 5; i++) {
                const x = padding + (chartWidth / 5) * i;
                ctx.beginPath(); ctx.moveTo(x, padding); ctx.lineTo(x, height - padding); ctx.stroke();
            }

            // Draw axes
            ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(padding, padding); ctx.lineTo(padding, height - padding);
            ctx.lineTo(width - padding, height - padding); ctx.stroke();

            // Draw Y-axis labels (balance)
            ctx.font = '11px sans-serif'; ctx.fillStyle = '#666'; ctx.textAlign = 'right';
            for (let i = 0; i <= 5; i++) {
                const balance = minBalance + (maxBalance - minBalance) * (5 - i) / 5;
                const y = padding + (chartHeight / 5) * i;
                ctx.fillText(balance.toFixed(0), padding - 8, y + 4);
            }

            // Draw X-axis labels (price)
            ctx.textAlign = 'center';
            for (let i = 0; i <= 5; i++) {
                const price = minPrice + (maxPrice - minPrice) * i / 5;
                const x = padding + (chartWidth / 5) * i;
                ctx.fillText(price.toFixed(2), x, height - padding + 20);
            }

            // Draw curve
            ctx.strokeStyle = '#1890ff'; ctx.lineWidth = 2;
            ctx.beginPath();
            data.forEach((point, index) => {
                const x = xScale(point.price), y = yScale(point.balance);
                index === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            });
            ctx.stroke();

            // Draw current point
            ctx.fillStyle = '#52c41a';
            ctx.beginPath(); ctx.arc(xScale(currentPrice), yScale(avgBalance), 6, 0, Math.PI * 2); ctx.fill();

            // Draw target point
            ctx.fillStyle = '#ff4d4f';
            ctx.beginPath(); ctx.arc(xScale(targetPrice), yScale(targetBalance), 6, 0, Math.PI * 2); ctx.fill();

            // Draw data labels for points
            ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
            ctx.fillStyle = '#52c41a';
            ctx.fillText(avgBalance.toFixed(0), xScale(currentPrice), yScale(avgBalance) - 12);
            ctx.fillStyle = '#ff4d4f';
            ctx.fillText(targetBalance.toFixed(0), xScale(targetPrice), yScale(targetBalance) - 12);

            // Draw axis titles
            ctx.fillStyle = '#666'; ctx.font = '12px sans-serif';
            ctx.fillText('价格 (%)', width / 2, height - 10);
            ctx.save(); ctx.translate(20, height / 2); ctx.rotate(-Math.PI / 2);
            ctx.fillText('余额 (万元)', 0, 0); ctx.restore();

            // Draw legend
            ctx.fillStyle = '#52c41a'; ctx.textAlign = 'left';
            ctx.beginPath(); ctx.arc(width - 120, 30, 5, 0, Math.PI * 2); ctx.fill();
            ctx.fillText('当前状态', width - 110, 34);
            ctx.fillStyle = '#ff4d4f';
            ctx.beginPath(); ctx.arc(width - 120, 50, 5, 0, Math.PI * 2); ctx.fill();
            ctx.fillText('目标状态', width - 110, 54);
        }
    </script>
</body>
</html>
